name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua and luarocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.3 luarocks
          lua -v
          luarocks --version

      - name: Install busted (test runner)
        run: |
          luarocks install --local busted

      - name: Add luarocks bin to PATH
        run: echo "$HOME/.luarocks/bin" >> $GITHUB_PATH

      - name: Run tests
        run: sh tests/run_tests.sh
